spring:
  config:
    import:
      - "optional:file:.env[.properties]"

  profiles:
    active: local

  application:
    name: core

  data:
    redis:
      enabled: ${REDIS_ENABLED:true}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  r2dbc:
    url: r2dbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:schemafy}
    username: ${DB_USER:schemafy}
    password: ${DB_PASSWORD:schemafy}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20

  output:
    ansi:
      enabled: always

  sql:
    init:
      mode: always
      schema-locations: classpath:ddl/mariadb/**/*.sql

cache:
  caffeine:
    enabled: true
    maximum-size: 10000
    expire-after-write-minutes: 30
    expire-after-access-minutes: 10
  redis:
    enabled: true
    default-ttl-minutes: 30
    key-prefix: 'cache::'

collaboration:
  presence:
    session-ttl: ${COLLABORATION_PRESENCE_SESSION_TTL:90s}
    heartbeat-interval: ${COLLABORATION_PRESENCE_HEARTBEAT_INTERVAL:30s}
    cleanup-interval: ${COLLABORATION_PRESENCE_CLEANUP_INTERVAL:30s}

hmac:
  secret: ${HMAC_SECRET:default-hmac-secret-change-me-in-production}
  previous-secret: ${HMAC_PREVIOUS_SECRET:}
  timestamp-tolerance-seconds: 30
  enabled: true
  enforcement-mode: ENFORCE

problem:
  type-base-uri: about:blank

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:}
    frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK_URL:}

sharelink:
  pepper: ${SHARELINK_PEPPER:default-pepper}

mcp:
  security:
    token:
      secret: ${MCP_TOKEN_SECRET:schemafy-mcp-local-secret-minimum-256-bit-key-value}
      issuer: ${MCP_TOKEN_ISSUER:schemafy-mcp}
      audience: ${MCP_TOKEN_AUDIENCE:schemafy-mcp}
      token-type: ${MCP_TOKEN_TYPE:MCP}
      required-scope: ${MCP_TOKEN_REQUIRED_SCOPE:mcp}
      revocation-key-prefix: "${MCP_TOKEN_REVOCATION_KEY_PREFIX:mcp:token:revoked:}"
      expires-in: ${MCP_TOKEN_EXPIRES_IN:7d}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - caches
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
