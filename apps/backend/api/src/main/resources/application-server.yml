spring:
  config:
    activate:
      on-profile: server

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-jwt-token-generation-min-256-bits-required}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000
  issuer: schemafy-test
  audience: schemafy-test-audience
  cookie:
    secure: true

mcp:
  security:
    token:
      secret: ${MCP_TOKEN_SECRET}

cors:
  allowed-origins: ${JWT_ALLOWED_ORIGINS:http://localhost:3000}

auth:
  mail:
    enabled: ${SMTP_ENABLED:true}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
