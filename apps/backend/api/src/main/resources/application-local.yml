spring:
  config:
    activate:
      on-profile: local

jwt:
  secret: my-super-secret-key-for-jwt-token-generation-min-256-bits-required
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000
  issuer: schemafy-test
  audience: schemafy-test-audience
  cookie:
    secure: false

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: http://localhost:8080/public/api/v1.0/oauth/github/callback
    frontend-callback-url: http://localhost:3001/oauth/callback

cors:
  allowed-origins: http://localhost:3001

auth:
  mail:
    enabled: ${SMTP_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      probes:
        enabled: true
