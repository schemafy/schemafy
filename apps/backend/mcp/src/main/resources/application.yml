spring:
  config:
    import:
      - "optional:file:.env[.properties]"

  profiles:
    active: local

  application:
    name: schemafy-mcp

  ai:
    mcp:
      server:
        name: schemafy-mcp
        version: 0.0.1
        protocol: STREAMABLE
        type: ASYNC
        annotation-scanner:
          enabled: true

  r2dbc:
    url: r2dbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:schemafy}
    username: ${DB_USER:schemafy}
    password: ${DB_PASSWORD:schemafy}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20

  output:
    ansi:
      enabled: always

  sql:
    init:
      mode: always
      schema-locations: classpath:ddl/mariadb/**/*.sql

server:
  port: ${MCP_SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
