spring:
  application:
    name: schemafy-mcp-test

  ai:
    mcp:
      server:
        name: schemafy-mcp-test
        version: 0.0.1
        protocol: STREAMABLE
        type: ASYNC
        annotation-scanner:
          enabled: true

  r2dbc:
    url: r2dbc:h2:mem:///schemafy-mcp;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    pool:
      enabled: true
      initial-size: 1
      max-size: 5

  sql:
    init:
      schema-locations: classpath:ddl/h2/**/*.sql
      mode: always

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      probes:
        enabled: true
