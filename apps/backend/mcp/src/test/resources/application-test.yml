spring:
  application:
    name: schemafy-mcp-test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  data:
    redis:
      enabled: false

  ai:
    mcp:
      server:
        name: schemafy-mcp-test
        version: 0.0.1
        instructions: >
          Schemafy MCP exposes read-only access to the authenticated user's
          Schemafy workspaces, projects, schemas, ERD tables, columns, indexes,
          constraints, relationships, memos, and database vendors. Use these
          tools whenever the user asks about current Schemafy
          workspace/project/ERD/schema/database structure or permissions. If an
          ID is unknown, start with schemafy_list_workspaces, then
          schemafy_list_projects, schemafy_list_schemas, schemafy_list_tables,
          and table-detail tools. Do not mutate data.
        protocol: STREAMABLE
        type: ASYNC
        annotation-scanner:
          enabled: true

  r2dbc:
    url: r2dbc:h2:mem:///schemafy-mcp;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    pool:
      enabled: true
      initial-size: 1
      max-size: 5

  sql:
    init:
      schema-locations: classpath:ddl/h2/**/*.sql
      mode: always

server:
  port: 0

mcp:
  security:
    token:
      secret: test-schemafy-mcp-secret-minimum-256-bit-key-value
      issuer: schemafy-mcp-test
      audience: schemafy-mcp-test
      token-type: MCP
      required-scope: mcp
    rate-limit:
      enabled: false
      requests: 100
      window: 1m

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      probes:
        enabled: true
