name: Save PR Context

on:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: save-pr-context
  cancel-in-progress: false

env:
  CONTEXT_BRANCH: pr-contexts

jobs:
  save-context:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && !github.event.pull_request.draft }}

    steps:
      - name: Update file-index.json on dedicated branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          [ -z "${PR_NUMBER:-}" ] && exit 0

          if ! gh api "repos/${GITHUB_REPOSITORY}/branches/${CONTEXT_BRANCH}" >/dev/null 2>&1; then
            main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" --jq '.object.sha' 2>/dev/null || true)"
            if [ -z "${main_sha:-}" ]; then
              echo "ERROR: failed to resolve main SHA to seed ${CONTEXT_BRANCH}."
              exit 1
            fi
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST \
              -f ref="refs/heads/${CONTEXT_BRANCH}" \
              -f sha="${main_sha}" >/dev/null 2>&1 || true
          fi

          changed_files="$(
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
              | jq -r '.[].filename' | grep -v '^\.github/pr-contexts/file-index\.json$' | head -n 50
          )"

          [ -z "${changed_files:-}" ] && exit 0

          index_response="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/pr-contexts/file-index.json?ref=${CONTEXT_BRANCH}" 2>/dev/null || true)"
          existing_sha=""
          existing_content="{}"
          if [ -n "${index_response:-}" ]; then
            file_sha="$(echo "${index_response}" | jq -r '.sha // ""')"
            file_content="$(echo "${index_response}" | jq -r '.content // ""')"
            if [ -n "${file_sha:-}" ] && [ -n "${file_content:-}" ]; then
              existing_sha="${file_sha}"
              existing_content="$(printf '%s' "${file_content}" | tr -d '\n' | base64 -d 2>/dev/null || echo '{}')"
            fi
          fi

          files_json="$(printf '%s\n' "${changed_files}" | jq -Rsc 'split("\n") | map(select(. != ""))')"

          if [ -z "${files_json:-}" ] || [ "${files_json}" = "[]" ]; then
            echo "No changed files to index."
            exit 0
          fi

          updated_content="$(
            printf '%s' "${existing_content}" | jq \
              --argjson files "${files_json}" \
              --arg pr "${PR_NUMBER}" \
              'reduce $files[] as $file (
                .;
                if (.[$file] | type) == "array"
                then
                  if (.[$file] | map(select(. == ($pr | tonumber))) | length) == 0
                  then .[$file] += [($pr | tonumber)]
                  else .
                  end
                else .[$file] = [($pr | tonumber)]
                end
              )'
          )"

          if [ -z "${updated_content:-}" ]; then
            echo "ERROR: failed to build updated file-index content."
            exit 1
          fi

          new_content="$(printf '%s' "${updated_content}" | base64 -w0)"

          if [ -n "${existing_sha:-}" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/contents/.github/pr-contexts/file-index.json" \
              --method PUT \
              -f message="chore: update file-index for PR #${PR_NUMBER}" \
              -f content="${new_content}" \
              -f branch="${CONTEXT_BRANCH}" \
              -f sha="${existing_sha}" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/contents/.github/pr-contexts/file-index.json" \
              --method PUT \
              -f message="chore: add file-index for PR #${PR_NUMBER}" \
              -f content="${new_content}" \
              -f branch="${CONTEXT_BRANCH}" >/dev/null
          fi

          echo "file-index.json updated for PR #${PR_NUMBER} on ${CONTEXT_BRANCH}"